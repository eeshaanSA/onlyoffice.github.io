 <!DOCTYPE html>
 <html lang="en">
 
 <head>
   <meta charset="UTF-8" />
   <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
   <title>Sample</title>
 
   <style type="text/css">
     html,
     body {
       margin: 0px;
       padding: 0px;
       overflow: hidden;
       width: 100%;
       height: 100%;
     }
 
     input {
       padding: 10px;
       margin: 5px 0;
       border: 1px solid #ccc;
       border-radius: 5px;
       box-sizing: border-box;
       font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
       font-size: 11px;
     }
 
     p {
       font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
       font-size: 15px;
       text-align: center;
     }
 
     #userInputLabel {
       font-size: 15px;
       text-align: center;
       margin: 5px;
     }
 
     .userInputContainer {
       display: flex;
       flex-direction: column;
       justify-content: center;
       align-items: center;
     }
 
     #fileInputContainer {
       display: flex;
       flex-direction: column;
       align-items: center;
       justify-content: center;
     }
 
     .container {
       box-sizing: border-box;
       margin: 10px;
       height: 300px;
       display: flex;
       flex-flow: column;
       justify-content: space-around;
       align-items: center;
     }
 
     #btnContainer {
       display: flex;
       justify-content: center;
       font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
 
     }
 
     #addDataBtn {
       margin: 5px;
       width: auto;
       min-width: 100px;
       height: 30px;
     }
   </style>
 
   <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
   <script type="text/javascript" src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>
   <link rel="stylesheet" href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css" />
   <script type="text/javascript" src="scripts/code.js"></script>
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.2/jquery.min.js"></script>
 </head>
 
 <body>
 
     <div class="container">
       <div class="userInputContainer">
         <labels for="userInput" id="userInputLabel">Enter the ComboBox name:</labels>
         <input style="width: 200px;" type="text" placeholder="The name of the ComboBox goes here 1" id="userInput"
           name="userInput" required="true" />
       </div>
       <div id="fileInputContainer">
         <p id="fileInputText" style="margin: 5px;">
           Select or drop a file here
         </p>
         <input type="file" id="fileInput" accept=" .csv" required="true" />
       </div>
 
       <div id="btnContainer">
         <button type="submit" class="btn-text-default primary" id="addDataBtn">
           Add data from file
         </button>
       </div>
     </div>
 
 </body>
 
 </html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Plugin</title>

    <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          font-family: 'Roboto', sans-serif;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          background-color: #f0f0f0;
          padding: 20px;
      }

      .container {
          width: 100%;
          max-width: 1200px;
          height: 100%;
          background-color: #fff;
          border-radius: 15px;
          box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
          display: flex;
          flex-direction: column;
          padding: 20px;
      }

      .player-container {
          width: 100%;
          flex-grow: 1;
          display: flex;
          justify-content: center;
          align-items: center;
      }

      .player-container iframe {
          width: 100%;
          height: 40vh; /* 60% of the viewport height for a larger player */
          border-radius: 10px;
          border: 2px solid #ddd;
          box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      }

      .search-container {
          width: 100%;
          margin: 20px 0;
          display: flex;
          justify-content: center;
      }

      .search-container input {
          width: 100%;
          max-width: 600px;
          padding: 12px 15px;
          border: 2px solid #ddd;
          border-radius: 30px;
          box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
          outline: none;
          font-size: 18px;
      }

      .search-container input:focus {
          border-color: #007BFF;
      }

      .results-container {
          width: 100%;
          max-width: 600px;
          margin: 0 auto;
          overflow-y: auto;
          max-height: 20vh; /* 20% of the viewport height */
      }

      .results-container ul {
          list-style: none;
          padding: 0;
      }

      .results-container ul li {
          padding: 10px;
          font-size: 16px;
          color: #333;
          cursor: pointer;
          transition: all 0.2s ease-in-out;
          border-bottom: 1px solid #ddd;
      }

      .results-container ul li:hover {
          background-color: #007BFF;
          color: white;
          border-radius: 8px;
      }

      .results-container ul li:not(:last-child) {
          margin-bottom: 10px;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
          .player-container iframe {
              height: 40vh;
          }

          .results-container ul li {
              font-size: 14px;
          }
      }

      @media (max-width: 480px) {
          .search-container input {
              font-size: 16px;
          }
      }
  </style>

    <script
      type="text/javascript"
      src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"
    ></script>
    <script
      type="text/javascript"
      src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.2/jquery.min.js"></script>
  </head>

  <body>
    <div class="container">
      <!-- Video Player Container -->
      <div class="player-container">
        <iframe
          src=""
          scrolling="no"
          frameborder="no"
          allowfullscreen="true"
        >
        </iframe>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <input type="text" placeholder="Search for videos..." />
      </div>

      <!-- Search Results -->
      <div class="results-container">
        <ul>
          <li>Sample Video 1</li>
          <li>Sample Video 2</li>
          <li>Sample Video 3</li>
          <li>Sample Video 4</li>
          <li>Sample Video 5</li>
        </ul>
      </div>
    </div>
  </body>
  <script type="text/javascript" src="scripts/test.js"></script>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Bilibili Video Embedder</title>

   <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Roboto', s ans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f0f0;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        background-color: #fff;
        border-radius: 15px;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        padding: 20px;
      }

      .input-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 20px;
      }

      .input-container input {
        width: 100%;
        max-width: 600px;
        padding: 12px 15px;
        border: 2px solid #ddd;
        border-radius: 30px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        outline: none;
        font-size: 18px;
        margin-bottom: 10px;
      }

      .input-container input:focus {
        border-color: #007BFF;
      }

      .input-container button {
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      }

      .input-container button:hover {
        background-color: #0056b3;
      }

      .player-container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .player-container iframe {
        width: 100%;
        max-width: 900px;
        height: 500px;
        border-radius: 10px;
        border: 2px solid #ddd;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Input for Bilibili Video Link -->
      <div class="input-container">
        <input
          id="bilibiliLink"
          type="text"
          placeholder="Insert Bilibili video link here..."
        />
        <button onclick="embedBilibiliVideo()">Embed Video</button>
      </div>

      <!-- Video Player Container -->
      <div class="player-container">
        <iframe
          id="bilibiliPlayer"
          src=""
          frameborder="no"
          allowfullscreen="true"
        ></iframe>
      </div>
    </div>

    <script>
      function embedBilibiliVideo() {
        // Get the video link from the input
        const link = document.getElementById('bilibiliLink').value;
        
        // Validate the link
        if (!link || !link.includes('bilibili.com/video')) {
          alert('Please insert a valid Bilibili video link!');
          return;
        }

        // Extract the BV or AV code from the URL
        const regex = /\/video\/(BV\w+|av\d+)/;
        const match = link.match(regex);
        
        if (match && match[1]) {
          // Embed the video in the iframe using the Bilibili player URL
          const videoID = match[1];
          const embedUrl = `https://player.bilibili.com/player.html?bvid=${videoID}&page=1`;

          // Set the iFrame src to the embed URL
          document.getElementById('bilibiliPlayer').src = embedUrl;
        } else {
          alert('Could not extract video ID from the link. Please check the URL.');
        }
      }
    </script>
  </body>
</html>
